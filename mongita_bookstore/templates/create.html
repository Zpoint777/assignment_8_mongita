{% extends 'base.html' %}
{% block container %}
<main style="padding:40px; max-width:600px; margin:auto;">
    <h2>Add a New Book</h2>

    <form action="{{ url_for('create_post') }}" method="POST">

        <label>Title:</label><br>
        <input type="text" name="title" required style="width:100%;"><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" required style="width:100%;"><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" required style="width:100%;"><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" required style="width:100%;"><br><br>

        <label>Image Filename (如 beethoven.gif):</label><br>
        <input type="text" name="image" required style="width:100%;"><br><br>

        <label>Category:</label><br>
        <select name="categoryId" required style="width:100%;">
            {% for cat in categories %}
                <option value="{{ cat.categoryId }}">{{ cat.categoryName }}</option>
            {% endfor %}
        </select><br><br>

        <label>Read Now:</label><br>
        <select name="readNow" style="width:100%;">
            <option value="0">No (0)</option>
            <option value="1">Yes (1)</option>
        </select><br><br>

        <button type="submit" style="background-color: green; color: white; padding: 10px 20px; border: none; cursor: pointer;">
            Add Book
        </button>
        <a href="{{ url_for('read') }}" style="margin-left: 20px;">Cancel</a>
    </form>
</main>
{% endblock %}
