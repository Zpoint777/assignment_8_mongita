{% extends 'base.html' %}
{% block container %}
<main style="padding:40px; max-width:600px; margin:auto;">
    <h2>Edit Book: {{ book.title }}</h2>
    <form action="{{ url_for('edit_post', bookId=book.bookId) }}" method="POST">
        
        <label>Title:</label><br>
        <input type="text" name="title" value="{{ book.title }}" required><br><br>

        <label>Author:</label><br>
        <input type="text" name="author" value="{{ book.author }}" required><br><br>

        <label>ISBN:</label><br>
        <input type="text" name="isbn" value="{{ book.isbn }}" required><br><br>

        <label>Price:</label><br>
        <input type="number" step="0.01" name="price" value="{{ book.price }}" required><br><br>

        <label>Image Filename:</label><br>
        <input type="text" name="image" value="{{ book.image }}" required><br><br>

        <label>Category:</label><br>
        <select name="categoryId">
            {% for cat in categories %}
                <option value="{{ cat.categoryId }}" {% if cat.categoryId == book.categoryId %}selected{% endif %}>
                    {{ cat.categoryName }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Read Now:</label><br>
        <select name="readNow">
            <option value="0" {% if book.readNow == 0 %}selected{% endif %}>No</option>
            <option value="1" {% if book.readNow == 1 %}selected{% endif %}>Yes</option>
        </select><br><br>

        <button type="submit">Update Book</button>
        <a href="{{ url_for('read') }}" style="margin-left: 20px;">Cancel</a>
    </form>
</main>
{% endblock %}
